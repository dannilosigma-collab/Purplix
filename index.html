<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purplix</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- AUTH -->
    <div id="auth">

        <div id="loginBox" class="card">
            <h2>Вход</h2>

            <input id="loginName" placeholder="Имя">

            <div class="pass-box">
                <input id="loginPass" type="password" placeholder="Пароль">
                <span class="eye-btn" onclick="togglePass('loginPass', this)">🔒</span>
            </div>

            <button id="loginBtn" class="main-btn">Войти</button>

            <p class="text">Нет аккаунта?</p>
            <button id="goRegister" class="outline-btn">Регистрация</button>
        </div>

        <div id="registerBox" class="card" style="display:none;">
            <h2>Регистрация</h2>

            <input id="regName" placeholder="Имя">

            <div class="pass-box">
                <input id="regPass" type="password" placeholder="Пароль">
                <span class="eye-btn" onclick="togglePass('regPass', this)">🔒</span>
            </div>

            <button id="regBtn" class="main-btn">Создать аккаунт</button>

            <p class="text">Уже есть аккаунт?</p>
            <button id="goLogin" class="outline-btn">Войти</button>
        </div>

    </div>

    <!-- APP -->
    <div id="app" style="display:none;">

        <div class="topbar">
            <h2>Purplix</h2>
            <div class="topbar-right">
                <span id="user"></span>
                <button id="logoutBtn">Выйти</button>
            </div>
        </div>
<div class="main">

    <div class="sidebar">
        <h3>Меню</h3>

        <button>Посты (Кнопка не рабочяя)</button>
		<button>Видео (Кнопка не рабочяя)</button>
		<button>Шортсы (Кнопка не рабочяя)</button>
        <button>Сообщения (Кнопка не рабочяя)</button>
        <button>Настройки (Кнопка не рабочяя)</button>
    </div>

    <div id="feed">
        <div id="posts"></div>

        <div class="postBox">
            <input id="postText" placeholder="Написать что-то...">
            <button id="postBtn">Опубликовать</button>
        </div>
    </div>

</div>

        </div>

    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="script.js"></script>
</body>
</html>
