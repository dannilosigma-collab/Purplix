<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purplix</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- AUTH -->
    <div id="auth">

        <div id="loginBox" class="card">
            <h2>Login</h2>

            <input id="loginName" placeholder="Username" maxlength="20">

            <div class="pass-box">
                <input id="loginPass" type="password" placeholder="Password">
                <span class="eye-btn" onclick="togglePass('loginPass', this)">🔒</span>
            </div>

            <button id="loginBtn" class="main-btn">Log In</button>

            <p class="text">Don't have an account?</p>
            <button id="goRegister" class="outline-btn">Register</button>
        </div>

        <div id="registerBox" class="card" style="display:none;">
            <h2>Register</h2>

            <input id="regName" placeholder="Username" maxlength="20">

            <div class="pass-box">
                <input id="regPass" type="password" placeholder="Password">
                <span class="eye-btn" onclick="togglePass('regPass', this)">🔒</span>
            </div>

            <button id="regBtn" class="main-btn">Create Account</button>

            <p class="text">Already have an account?</p>
            <button id="goLogin" class="outline-btn">Log In</button>
        </div>

    </div>

    <!-- APP -->
    <div id="app" style="display:none;">

        <div class="topbar">
            <h2>Purplix</h2>
            <div class="topbar-right">
                <span id="user"></span>
                <button id="logoutBtn">Log Out</button>
            </div>
        </div>

        <div class="main">

            <!-- SIDEBAR -->
            <div class="sidebar">

                <button id="sidebarToggle" class="sidebar-toggle">></button>

                <h3>Menu</h3>

                <button id="btnPosts">Posts</button>
                <button>Videos</button>
                <button>Shorts</button>
                <button>Messages</button>
                <button>Settings</button>

                <!-- 👑 OWNER BUTTON -->
                <button id="ownerBtn" style="display:none;">Owner Settings</button>

            </div>

            <!-- FEED -->
            <div id="feed">

    <!-- POSTS TAB -->
    <div id="postsTab">
        <div id="posts"></div>

        <div class="postBox">
            <input id="postText" placeholder="Write something...">
            <button id="postBtn">Post</button>
        </div>
    </div>

    <!-- OWNER TAB -->
    <div id="ownerTab" style="display:none;">
  
  <!-- ADD VERIFY -->
  <div class="card">
    <h3>Add Verification</h3>

    <input id="searchUser" placeholder="Search user...">
    <div id="userResults"></div>
  </div>

  <!-- REMOVE VERIFY -->
  <div class="card" style="margin-top:15px;">
    <h3>Remove Verification</h3>

    <input id="removeUser" placeholder="Search user...">
    <div id="removeResults"></div>
  </div>

</div>

</div>

        </div>

    </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="script.js"></script>

</body>
</html>
