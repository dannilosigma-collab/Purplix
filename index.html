<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purplix</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- AUTH -->
    <div id="auth">

        <div id="loginBox" class="card">
            <h2>Login</h2>

            <input id="loginName" placeholder="Name...">

            <div class="pass-box">
                <input id="loginPass" type="password" placeholder="Пароль">
                <span class="eye-btn" onclick="togglePass('loginPass', this)">🔒</span>
            </div>

            <button id="loginBtn" class="main-btn">Login</button>

            <p class="text">No account?</p>
            <button id="goRegister" class="outline-btn">Registration</button>
        </div>

        <div id="registerBox" class="card" style="display:none;">
            <h2>Registration</h2>

            <input id="regName" placeholder="Name...">

            <div class="pass-box">
                <input id="regPass" type="password" placeholder="Password">
                <span class="eye-btn" onclick="togglePass('regPass', this)">🔒</span>
            </div>

            <button id="regBtn" class="main-btn">Create account</button>

            <p class="text">Already have an accoint?</p>
            <button id="goLogin" class="outline-btn">Login</button>
        </div>

    </div>

    <!-- APP -->
    <div id="app" style="display:none;">

        <div class="topbar">
            <h2>Purplix</h2>
            <div class="topbar-right">
                <span id="user"></span>
                <button id="logoutBtn">Log out</button>
            </div>
        </div>
<div class="main">

    <div class="sidebar">
        <h3>Menu</h3>

        <button>Post (Кнопка не рабочяя)</button>
		<button>Video (Кнопка не рабочяя)</button>
		<button>Shorts (Кнопка не рабочяя)</button>
        <button>Messages (Кнопка не рабочяя)</button>
        <button>Setings (Кнопка не рабочяя)</button>
    </div>

    <div id="feed">
        <div id="posts"></div>

        <div class="postBox">
            <input id="postText" placeholder="Write...">
            <button id="postBtn">Publish</button>
        </div>
    </div>

</div>

        </div>

    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="script.js"></script>
</body>
</html>
